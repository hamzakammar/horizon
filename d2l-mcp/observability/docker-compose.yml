version: "3.8"

services:
  gateway:
    build:
      context: ../gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - NODE_WORKER_URL=http://backend:3000
      - SUPABASE_URL=https://qialmumlcezeqvyyhjlu.supabase.co
      - SUPABASE_JWKS_URL=https://qialmumlcezeqvyyhjlu.supabase.co/auth/v1/.well-known/jwks.json
      - PORT=8080
    depends_on:
      - backend

  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      - MCP_TRANSPORT=http
      - MCP_PORT=3000
      - NODE_ENV=production
    # Backend is NOT exposed externally — only gateway port 8080 is

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    depends_on:
      - gateway

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  grafana_data:
